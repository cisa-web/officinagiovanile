<header class="header">
    <nav class="nav">
        <div class="logo">
            <a href="/">Officina Giovanile</a>
            <div class="logo-switches">
                <button id="theme-toggle" aria-label="Toggle theme">
                    <svg id="moon" xmlns="http://www.w3.org/2000/svg" width="24" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                    <svg id="sun" xmlns="http://www.w3.org/2000/svg" width="24" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                </button>
            </div>
        </div>

        <button class="hamburger" id="hamburger-btn" aria-label="Menu">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <ul id="main-nav">
            <li><a href="/">Home</a></li>
            <li class="has-dropdown">
                <a href="#">Opportunità ▾</a>
                <ul class="dropdown">
                    <li><a href="/erasmus/">Erasmus+</a></li>
                    <li><a href="/esc/">ESC Volontariato</a></li>
                    <li><a href="/formazione/">Formazione</a></li>
                </ul>
            </li>
            <li><a href="/posts/">Blog</a></li>
            <li><a href="/chi-siamo/">Chi siamo</a></li>
            <li><a href="/contatti/">Contatti</a></li>
        </ul>
    </nav>
</header>

<script>
document.addEventListener('DOMContentLoaded', function() {
    // Hamburger
    const btn = document.getElementById('hamburger-btn');
    const menu = document.getElementById('main-nav');
    if (btn && menu) {
        btn.addEventListener('click', function() {
            menu.classList.toggle('open');
            btn.classList.toggle('active');
        });
    }

    // Dropdown mobile toggle
    document.querySelectorAll('li.has-dropdown > a').forEach(function(link) {
        link.addEventListener('click', function(e) {
            if (window.innerWidth <= 768) {
                e.preventDefault();
                const parent = this.closest('li.has-dropdown');
                parent.classList.toggle('open');
            }
        });
    });
});
</script>
