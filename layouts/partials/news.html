<section class="news-section">
  <div class="wrap">
    <h2 class="sec-title">Dal Nostro <span>Blog</span></h2>
    <div class="cards-grid">

      {{ range first 3 (where .Site.RegularPages "Section" "posts") }}
      <div class="news-card">
        <div class="news-card-img">
          {{ if .Params.cover.image }}
          <img src="{{ .Params.cover.image }}" alt="{{ .Params.cover.alt }}">
          {{ else }}
          <div class="img-placeholder img-blue"></div>
          {{ end }}
          {{ with .Params.tags }}
          <span class="cat-pill">{{ index . 0 }}</span>
          {{ end }}
        </div>
        <div class="news-card-body">
          <div class="news-meta">📅 {{ .Date.Format "2 January 2006" }}</div>
          <h3>{{ .Title }}</h3>
          <p>{{ .Description }}</p>
          <a href="{{ .Permalink }}" class="btn btn-orange">Leggi l'articolo →</a>
        </div>
      </div>
      {{ end }}

    </div>
  </div>
</section>
